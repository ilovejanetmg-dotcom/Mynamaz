<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>время намаза</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #ffffff;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #888888;
            --border: #e5e5e5;
            --accent: #2d6a4f;
            --progress-bg: #e8f5e9;
            --progress-fill: #4caf50;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
            padding: 24px 16px 48px;
            min-height: 100vh;
            color: var(--text);
        }

        .container { max-width: 500px; margin: 0 auto; }
        .logo { font-size: 20px; font-weight: 400; margin-bottom: 24px; }
        
        .search-bar { display: flex; gap: 10px; margin-bottom: 24px; }
        .search-input {
            flex: 1;
            padding: 14px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            font-size: 15px;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-btn {
            background: var(--accent);
            border: none;
            padding: 14px 24px;
            border-radius: 32px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .row-selects {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .method-select { flex: 1; }
        .school-select { flex: 1; }
        .method-select select, .school-select select {
            width: 100%;
            padding: 12px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            font-size: 13px;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .prayer-card {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .date-header {
            background: #f8f9fa;
            padding: 12px 20px;
            font-size: 13px;
            color: #666;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        
        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
            position: relative;
        }
        .prayer-item:last-child { border-bottom: none; }
        
        .prayer-item.current {
            background: rgba(76, 175, 80, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        /* Прогресс-бар внутри строки текущего намаза */
        .prayer-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: var(--progress-fill);
            transition: width 0.3s ease;
        }
        
        .prayer-name { font-size: 17px; font-weight: 500; position: relative; z-index: 1; }
        .prayer-time { 
            font-size: 20px; 
            font-weight: 600; 
            color: var(--accent);
            position: relative;
            z-index: 1;
        }
        
        .prayer-time-left {
            font-size: 12px;
            color: var(--text-light);
            margin-left: 8px;
            font-weight: 400;
        }
        
        .update-time { text-align: center; font-size: 12px; color: var(--text-light); margin-top: 24px; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-light); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading::after { content: '...'; animation: pulse 1.5s infinite; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">время намаза</div>

    <div class="search-bar">
        <input type="text" class="search-input" id="cityInput" placeholder="город..." value="Москва">
        <button class="search-btn" id="searchBtn">найти</button>
    </div>

    <div class="row-selects">
        <div class="method-select">
            <select id="methodSelect">
                <option value="13" selected>ДУМ РФ</option>
                <option value="3">MWL (Мусульманская лига)</option>
                <option value="1">UIS (Карачи)</option>
                <option value="2">ISNA (Сев. Америка)</option>
                <option value="12">Diyanet (Турция)</option>
            </select>
        </div>

        <div class="school-select">
            <select id="schoolSelect">
                <option value="0">Шафии</option>
                <option value="1" selected>Ханафи</option>
            </select>
        </div>
    </div>

    <div id="prayerContent"><div class="loading">загружаем время намаза</div></div>
    <div class="update-time" id="updateTime"></div>
</div>

<script>
    let currentCity = "Москва", currentCountry = "Россия", currentMethod = 13;
    let currentSchool = 1;
    let currentPrayerData = null;
    let lastUpdateDate = null;

    const prayerNames = { Fajr: "Фаджр", Sunrise: "Восход", Dhuhr: "Зухр", Asr: "Аср", Maghrib: "Магриб", Isha: "Иша" };
    const prayerOrder = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];

    const monthsRuShort = {
        January: "янв", February: "фев", March: "мар", April: "апр",
        May: "мая", June: "июн", July: "июл", August: "авг",
        September: "сен", October: "окт", November: "ноя", December: "дек"
    };

    const weekdaysShort = {
        Monday: "Пн", Tuesday: "Вт", Wednesday: "Ср",
        Thursday: "Чт", Friday: "Пт", Saturday: "Сб", Sunday: "Вс"
    };

    function timeToMinutes(timeStr) {
        const [hours, minutes] = timeStr.split(':');
        return parseInt(hours) * 60 + parseInt(minutes);
    }

    function formatTimeLeft(minutes) {
        if (minutes < 0) minutes = 0;
        if (minutes < 60) return `${minutes} мин`;
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        if (mins === 0) return `${hours} ч`;
        return `${hours} ч ${mins} мин`;
    }

    // Получение текущего намаза
    function getCurrentPrayer(timings) {
        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        
        let currentPrayer = null;
        let nextPrayer = null;
        
        for (let i = 0; i < prayerOrder.length; i++) {
            const prayer = prayerOrder[i];
            if (timings[prayer]) {
                const prayerMinutes = timeToMinutes(timings[prayer]);
                if (prayerMinutes <= currentMinutes) {
                    currentPrayer = { name: prayerNames[prayer], time: timings[prayer], minutes: prayerMinutes, key: prayer, index: i };
                } else {
                    if (!nextPrayer) {
                        nextPrayer = { name: prayerNames[prayer], time: timings[prayer], minutes: prayerMinutes, key: prayer, index: i };
                    }
                    break;
                }
            }
        }
        
        if (currentPrayer && nextPrayer) {
            const isStillActive = currentMinutes < nextPrayer.minutes;
            if (isStillActive) {
                return { current: currentPrayer, next: nextPrayer };
            } else {
                return { current: nextPrayer, next: null };
            }
        }
        
        if (!currentPrayer && nextPrayer) {
            return { current: nextPrayer, next: null };
        }
        
        if (currentPrayer && !nextPrayer) {
            const firstPrayer = prayerOrder.find(p => timings[p]);
            if (firstPrayer) {
                const tomorrowPrayer = { name: prayerNames[firstPrayer], time: timings[firstPrayer], key: firstPrayer, index: 0, minutes: timeToMinutes(timings[firstPrayer]) + 24 * 60 };
                return { current: tomorrowPrayer, next: null };
            }
        }
        
        return { current: null, next: null };
    }

    // Вычисление прогресса и оставшегося времени
    function getCurrentPrayerProgress(timings, currentPrayer, nextPrayer) {
        if (!currentPrayer) return { percent: 0, timeLeft: 0 };
        
        const currentMinutes = new Date().getHours() * 60 + new Date().getMinutes();
        const startMinutes = currentPrayer.minutes;
        
        let endMinutes;
        if (nextPrayer) {
            endMinutes = nextPrayer.minutes;
        } else {
            const firstPrayer = prayerOrder.find(p => timings[p]);
            if (firstPrayer) {
                endMinutes = timeToMinutes(timings[firstPrayer]) + 24 * 60;
            } else {
                endMinutes = startMinutes + 60;
            }
        }
        
        const totalDuration = endMinutes - startMinutes;
        const elapsed = currentMinutes - startMinutes;
        const timeLeft = endMinutes - currentMinutes;
        
        if (totalDuration > 0 && elapsed > 0) {
            const percent = Math.min(99, Math.max(0, (elapsed / totalDuration) * 100));
            return { percent: Math.round(percent), timeLeft: timeLeft };
        }
        return { percent: 0, timeLeft: totalDuration };
    }

    function shouldUpdateData() {
        if (!lastUpdateDate) return true;
        const today = new Date().toDateString();
        return lastUpdateDate !== today;
    }

    function loadSettings() {
        const savedCity = localStorage.getItem('azan_city');
        const savedMethod = localStorage.getItem('azan_method');
        const savedSchool = localStorage.getItem('azan_school');
        
        if (savedCity) {
            currentCity = savedCity;
            document.getElementById('cityInput').value = currentCity;
        }
        if (savedMethod) {
            currentMethod = parseInt(savedMethod);
            document.getElementById('methodSelect').value = currentMethod;
        }
        if (savedSchool) {
            currentSchool = parseInt(savedSchool);
            document.getElementById('schoolSelect').value = currentSchool;
        }
        
        const cachedData = localStorage.getItem('azan_cached_data');
        if (cachedData) {
            try {
                const cache = JSON.parse(cachedData);
                if (cache.city === currentCity && cache.method === currentMethod && cache.school === currentSchool) {
                    currentPrayerData = cache.data;
                    lastUpdateDate = cache.date;
                }
            } catch(e) {}
        }
    }

    function saveSettings() {
        localStorage.setItem('azan_city', currentCity);
        localStorage.setItem('azan_method', currentMethod);
        localStorage.setItem('azan_school', currentSchool);
    }
    
    function saveCachedData(data) {
        const cache = {
            city: currentCity,
            method: currentMethod,
            school: currentSchool,
            data: data,
            date: new Date().toDateString()
        };
        localStorage.setItem('azan_cached_data', JSON.stringify(cache));
        currentPrayerData = data;
        lastUpdateDate = cache.date;
    }

    function renderPrayerTimes(timings, dateData) {
        const date = dateData.gregorian;
        const weekdayShort = weekdaysShort[date.weekday.en] || date.weekday.en.slice(0, 2);
        const day = date.day;
        const monthShort = monthsRuShort[date.month.en] || date.month.en.slice(0, 3);
        
        const shortDate = `${weekdayShort}, ${day} ${monthShort}`;
        
        const { current: currentPrayer, next: nextPrayerInfo } = getCurrentPrayer(timings);
        const { percent, timeLeft } = getCurrentPrayerProgress(timings, currentPrayer, nextPrayerInfo);
        
        let prayersHtml = `
            <div class="prayer-card">
                <div class="date-header">
                    <span>${shortDate}</span>
                    <span></span>
                </div>
        `;
        
        for (const [key, name] of Object.entries(prayerNames)) {
            if (timings[key]) {
                const isCurrent = (currentPrayer && currentPrayer.key === key);
                let timeDisplay = timings[key];
                let progressHtml = '';
                
                if (isCurrent && nextPrayerInfo) {
                    const timeLeftText = formatTimeLeft(timeLeft);
                    timeDisplay = `${timings[key]} · ещё ${timeLeftText}`;
                    progressHtml = `<div class="prayer-progress" style="width: ${percent}%;"></div>`;
                }
                
                prayersHtml += `
                    <div class="prayer-item ${isCurrent ? 'current' : ''}" style="position: relative;">
                        ${progressHtml}
                        <span class="prayer-name">${name}</span>
                        <span class="prayer-time">${timeDisplay}</span>
                    </div>
                `;
            }
        }
        prayersHtml += '</div>';
        
        document.getElementById('prayerContent').innerHTML = prayersHtml;
        document.getElementById('updateTime').innerHTML = `обновлено: ${new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })} · данные: AlAdhan API`;
    }

    async function fetchPrayerTimes(force = false) {
        if (!force && currentPrayerData && !shouldUpdateData()) {
            renderPrayerTimes(currentPrayerData.timings, currentPrayerData.date);
            return;
        }
        
        const contentDiv = document.getElementById('prayerContent');
        contentDiv.innerHTML = '<div class="loading">загружаем время намаза</div>';
        const url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(currentCity)}&country=${encodeURIComponent(currentCountry)}&method=${currentMethod}&school=${currentSchool}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.code === 200) {
                const timings = data.data.timings;
                const date = data.data.date;
                
                const prayerData = { timings, date };
                saveCachedData(prayerData);
                renderPrayerTimes(timings, date);
                saveSettings();
            } else {
                contentDiv.innerHTML = '<div class="loading">❌ город не найден</div>';
            }
        } catch (error) {
            if (currentPrayerData) {
                renderPrayerTimes(currentPrayerData.timings, currentPrayerData.date);
                document.getElementById('updateTime').innerHTML = `⚠️ данные из кэша · ${new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}`;
            } else {
                contentDiv.innerHTML = '<div class="loading">❌ ошибка загрузки</div>';
            }
        }
    }

    async function searchCity() {
        const city = document.getElementById('cityInput').value.trim();
        if (city) {
            currentCity = city;
            currentMethod = parseInt(document.getElementById('methodSelect').value);
            currentSchool = parseInt(document.getElementById('schoolSelect').value);
            await fetchPrayerTimes(true);
        }
    }

    document.getElementById('searchBtn').addEventListener('click', searchCity);
    document.getElementById('cityInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchCity();
    });
    document.getElementById('methodSelect').addEventListener('change', () => {
        currentMethod = parseInt(document.getElementById('methodSelect').value);
        fetchPrayerTimes(true);
    });
    document.getElementById('schoolSelect').addEventListener('change', () => {
        currentSchool = parseInt(document.getElementById('schoolSelect').value);
        fetchPrayerTimes(true);
    });

    loadSettings();
    fetchPrayerTimes();
</script>
</body>
</html>
