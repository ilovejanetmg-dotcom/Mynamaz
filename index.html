<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>время намаза</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* БАЗОВЫЕ ПЕРЕМЕННЫЕ (Aura) */
        :root {
            --bg: #ffffff;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #888888;
            --text-pale: #888888;
            --border: #e5e5e5;
            --accent: #2d6a4f;
            --current-bg: rgba(45, 106, 79, 0.08);
            --divider: #f0f0f0;
            --shadow-sm: none;
            --shadow-md: none;
            --shadow-lg: none;
            --shadow-inset: none;
            --border-radius-sm: 32px;
            --border-radius-md: 24px;
            --border-radius-lg: 24px;
            --transition: none;
            --search-btn-bg: var(--accent);
            --search-btn-color: white;
            --search-input-padding: 12px 16px;
            --search-input-font-size: 14px;
            --search-btn-padding: 12px 20px;
            --search-btn-font-size: 14px;
            --select-border: 1px solid var(--border);
            --date-header-bg: #f8f9fa;
            --date-header-text-align: left;
            --prayer-item-margin: 0;
            --prayer-item-padding: 16px 20px;
            --prayer-item-radius: 0;
            --prayer-card-padding: 0;
            --prayer-item-border: 1px solid var(--divider);
            --prayer-item-shadow: none;
            --prayer-item-active-shadow: none;
            --prayer-item-transform: none;
            --prayer-item-transition: none;
            --settings-icon-border: none;
            --dropdown-bg: #ffffff;
            --time-right-min-width: 85px;
            --next-prayer-display: flex;
            --next-prayer-font-size: 14px;
            --next-prayer-padding: 4px 12px;
        }

        /* NEUMORPH ПЕРЕОПРЕДЕЛЕНИЯ */
        body.neumorph {
            --bg: #e0e5ec;
            --card: #e0e5ec;
            --text: #2c3e50;
            --text-light: #6b7b8c;
            --text-pale: #8a9aaa;
            --border: rgba(0,0,0,0.05);
            --accent: #2d6a4f;
            --current-bg: rgba(45, 106, 79, 0.1);
            --divider: rgba(0,0,0,0.05);
            --shadow-sm: 6px 6px 12px rgba(0,0,0,0.08), -6px -6px 12px rgba(255,255,255,0.6);
            --shadow-md: 8px 8px 16px rgba(0,0,0,0.08), -8px -8px 16px rgba(255,255,255,0.6);
            --shadow-lg: 14px 14px 28px rgba(0,0,0,0.08), -14px -14px 28px rgba(255,255,255,0.6);
            --shadow-inset: inset 4px 4px 10px rgba(0,0,0,0.05), inset -4px -4px 10px rgba(255,255,255,0.5);
            --border-radius-sm: 44px;
            --border-radius-md: 40px;
            --border-radius-lg: 36px;
            --transition: all 0.08s linear;
            --search-btn-bg: transparent;
            --search-btn-color: var(--accent);
            --search-input-padding: 10px 14px;
            --search-input-font-size: 13px;
            --search-btn-padding: 10px 16px;
            --search-btn-font-size: 13px;
            --select-border: none;
            --date-header-bg: var(--card);
            --date-header-text-align: center;
            --prayer-item-margin: 12px 16px;
            --prayer-item-padding: 12px 20px;
            --prayer-item-radius: 48px;
            --prayer-card-padding: 8px 0;
            --prayer-item-border: none;
            --prayer-item-shadow: var(--shadow-md);
            --prayer-item-active-shadow: var(--shadow-inset);
            --prayer-item-transform: scale(0.96);
            --prayer-item-transition: var(--transition);
            --settings-icon-border: var(--select-border);
            --dropdown-bg: var(--card);
            --time-right-min-width: 90px;
            --next-prayer-display: none;
        }

        /* ТЁМНАЯ ТЕМА AURA */
        body.dark-theme {
            --bg: #19191a;
            --card: #1e1e1e;
            --text: #e8e8e8;
            --text-light: #9a9a9a;
            --text-pale: #7a7a7a;
            --border: #2a2a2a;
            --accent: #4caf50;
            --current-bg: rgba(76, 175, 80, 0.12);
            --divider: #2a2a2a;
            --date-header-bg: #252526;
            --dropdown-bg: #252526;
            --prayer-item-border: 1px solid #2a2a2a;
        }

        /* ТЁМНАЯ ТЕМА NEUMORPH */
        body.dark-theme.neumorph {
            --bg: #19191a;
            --card: #1e1e1e;
            --text: #e8e8e8;
            --text-light: #9a9a9a;
            --text-pale: #7a7a7a;
            --border: rgba(255,255,255,0.08);
            --accent: #4caf50;
            --current-bg: rgba(76, 175, 80, 0.15);
            --divider: rgba(255,255,255,0.05);
            --shadow-sm: 6px 6px 12px rgba(0,0,0,0.3), -6px -6px 12px rgba(255,255,255,0.05);
            --shadow-md: 8px 8px 16px rgba(0,0,0,0.3), -8px -8px 16px rgba(255,255,255,0.05);
            --shadow-lg: 14px 14px 28px rgba(0,0,0,0.3), -14px -14px 28px rgba(255,255,255,0.05);
            --shadow-inset: inset 4px 4px 10px rgba(0,0,0,0.2), inset -4px -4px 10px rgba(255,255,255,0.02);
            --date-header-bg: var(--card);
            --dropdown-bg: #2a2a2a;
            --prayer-item-border: none;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
            padding: 8px 16px 48px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        button, input, select { outline: none; }

        .container { max-width: 500px; width: 100%; margin: 0 auto; }

        .top-row { display: flex; gap: 8px; margin-bottom: 24px; width: 100%; align-items: center; position: relative; }
        .search-bar { display: flex; gap: 8px; flex: 1; }
        .search-input {
            flex: 1; padding: var(--search-input-padding); background: var(--card);
            border: 1px solid var(--border); border-radius: var(--border-radius-sm);
            font-size: var(--search-input-font-size); color: var(--text-pale);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .search-input:focus { box-shadow: var(--shadow-inset); border-color: var(--accent); color: var(--text); }
        .search-btn {
            background: var(--search-btn-bg); border: none; padding: var(--search-btn-padding);
            border-radius: var(--border-radius-sm); color: var(--search-btn-color);
            font-weight: 600; cursor: pointer; box-shadow: var(--shadow-sm);
            transition: var(--transition);
            font-size: var(--search-btn-font-size);
        }
        .search-btn:active { box-shadow: var(--shadow-inset); transform: scale(0.96); }

        .settings-icon {
            background: var(--card); border: var(--settings-icon-border); padding: 10px;
            border-radius: 50%; cursor: pointer; box-shadow: var(--shadow-sm);
            transition: var(--transition);
            color: var(--text-light);
            display: flex; align-items: center; justify-content: center;
        }
        .settings-icon:active { box-shadow: var(--shadow-inset); transform: scale(0.96); }

        .settings-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: var(--dropdown-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.15s ease;
            min-width: 240px;
        }
        .settings-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-item {
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--border);
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-label {
            display: block;
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .dropdown-value {
            font-size: 14px;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 4px 0;
        }
        .dropdown-value span:first-child { flex: 1; }
        .dropdown-arrow { font-size: 10px; color: var(--text-light); }
        .sub-dropdown {
            margin-top: 8px;
            background: var(--dropdown-bg);
            border-radius: 16px;
            overflow: hidden;
            display: none;
            border: 1px solid var(--border);
        }
        .sub-dropdown.show { display: block; }
        .sub-item {
            padding: 10px 12px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text);
        }
        .sub-item:hover { background: rgba(0,0,0,0.05); }
        .sub-item.active { background: var(--accent); color: white; }
        
        .style-switch, .theme-switch {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .style-option, .theme-option-btn {
            flex: 1;
            text-align: center;
            padding: 8px 10px;
            font-size: 12px;
            border-radius: 30px;
            background: transparent;
            border: 1px solid var(--border);
            cursor: pointer;
            color: var(--text-light);
            transition: var(--transition);
        }
        .style-option.active, .theme-option-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .prayer-card {
            background: var(--card); 
            border-radius: var(--border-radius-md);
            border: 1px solid var(--border); 
            overflow: hidden;
            box-shadow: var(--shadow-lg); 
            padding: var(--prayer-card-padding);
        }
        
        .date-header {
            background: var(--date-header-bg); 
            padding: 12px 20px;
            font-size: 13px; 
            color: var(--text-light); 
            border-bottom: 1px solid var(--border);
            text-align: var(--date-header-text-align);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .next-prayer-countdown {
            display: var(--next-prayer-display);
            font-size: var(--next-prayer-font-size);
            color: var(--accent);
            font-weight: 600;
            background: rgba(45, 106, 79, 0.12);
            padding: var(--next-prayer-padding);
            border-radius: 24px;
        }
        
        .prayer-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: var(--prayer-item-padding); 
            margin: var(--prayer-item-margin);
            background: var(--card); 
            border-bottom: var(--prayer-item-border);
            border-radius: var(--prayer-item-radius);
            box-shadow: var(--prayer-item-shadow);
            transition: var(--prayer-item-transition);
            cursor: pointer;
        }
        .prayer-item:last-child { border-bottom: none; }
        .prayer-item:active { 
            box-shadow: var(--prayer-item-active-shadow); 
            transform: var(--prayer-item-transform);
        }
        .prayer-item.current { background: var(--current-bg); }
        
        .prayer-name { 
            font-size: 16.5px; 
            font-weight: 500; 
            color: var(--text); 
        }
        
        .prayer-time-wrapper {
            min-width: var(--time-right-min-width);
            text-align: right;
        }
        
        .prayer-time {
            font-size: 18.5px; 
            font-weight: 600; 
            color: var(--accent);
            white-space: nowrap;
        }
        
        .update-time { 
            text-align: center; 
            font-size: 12px; 
            color: var(--text-light); 
            margin-top: 20px; 
        }
        
        .loading { 
            text-align: center; 
            padding: 60px 20px; 
            color: var(--text-light); 
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-row">
        <div class="search-bar">
            <input type="text" class="search-input" id="cityInput" placeholder="город..." value="Салават">
            <button class="search-btn" id="searchBtn">найти</button>
        </div>
        <button class="settings-icon" id="settingsBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </button>
        <div class="settings-dropdown" id="settingsDropdown">
            <div class="dropdown-item">
                <div class="dropdown-label">источник</div>
                <div class="dropdown-value" id="methodValue">
                    <span>ДУМ РФ</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="sub-dropdown" id="methodSubDropdown">
                    <div class="sub-item" data-method="13">ДУМ РФ</div>
                    <div class="sub-item" data-method="3">MWL</div>
                    <div class="sub-item" data-method="1">UIS (Карачи)</div>
                    <div class="sub-item" data-method="2">ISNA</div>
                    <div class="sub-item" data-method="12">Diyanet</div>
                </div>
            </div>
            <div class="dropdown-item">
                <div class="dropdown-label">мазхаб</div>
                <div class="dropdown-value" id="schoolValue">
                    <span>Ханафитский</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="sub-dropdown" id="schoolSubDropdown">
                    <div class="sub-item" data-school="0">Шафиитский</div>
                    <div class="sub-item" data-school="1">Ханафитский</div>
                </div>
            </div>
            <div class="dropdown-item">
                <div class="dropdown-label">стиль</div>
                <div class="style-switch" id="styleToggle">
                    <div class="style-option active" data-style="aura">Aura</div>
                    <div class="style-option" data-style="neumorph">Neumorph</div>
                </div>
            </div>
            <div class="dropdown-item">
                <div class="dropdown-label">тема</div>
                <div class="theme-switch" id="themeToggle">
                    <div class="theme-option-btn active" data-theme="light">светлая</div>
                    <div class="theme-option-btn" data-theme="dark">тёмная</div>
                </div>
            </div>
        </div>
    </div>

    <div id="prayerContent"><div class="loading">загружаем время намаза</div></div>
    <div class="update-time" id="updateTime"></div>
</div>

<script>
    // ========== МАКСИМАЛЬНО ЛЁГКИЙ КОД ==========
    
    // Данные
    let city = "Салават";
    let method = 13;
    let school = 1;
    let prayerData = null;
    
    // Константы
    const prayerNames = { Fajr: "Фаджр", Sunrise: "Восход", Dhuhr: "Зухр", Asr: "Аср", Maghrib: "Магриб", Isha: "Иша" };
    const prayerOrder = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
    
    const months = { January: "янв", February: "фев", March: "мар", April: "апр", May: "мая", June: "июн", July: "июл", August: "авг", September: "сен", October: "окт", November: "ноя", December: "дек" };
    const weekdays = { Monday: "Пн", Tuesday: "Вт", Wednesday: "Ср", Thursday: "Чт", Friday: "Пт", Saturday: "Сб", Sunday: "Вс" };
    const METHODS = { 13: "ДУМ РФ", 3: "MWL", 1: "UIS", 2: "ISNA", 12: "Diyanet" };
    
    // Вспомогательные функции
    function timeToMinutes(t) { let [h, m] = t.split(':'); return parseInt(h) * 60 + parseInt(m); }
    
    function getCurrentPrayer(timings) {
        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        let current = null, next = null;
        
        for (let i = 0; i < prayerOrder.length; i++) {
            const key = prayerOrder[i];
            if (timings[key]) {
                const prayerMinutes = timeToMinutes(timings[key]);
                if (prayerMinutes <= currentMinutes) {
                    current = { name: prayerNames[key], key: key };
                } else if (!next) {
                    next = { name: prayerNames[key], key: key, minutes: prayerMinutes };
                    break;
                }
            }
        }
        
        if (current && next) {
            const left = next.minutes - currentMinutes;
            const h = Math.floor(left / 60);
            const m = left % 60;
            return { current: current.key, nextText: `до ${next.name} ${h}:${m.toString().padStart(2, '0')} ч` };
        }
        return { current: null, nextText: "" };
    }
    
    // Отрисовка
    function render() {
        if (!prayerData) return;
        
        const timings = prayerData.timings;
        const g = prayerData.date.gregorian;
        const dateStr = `${weekdays[g.weekday.en] || g.weekday.en.slice(0,2)}, ${g.day} ${months[g.month.en] || g.month.en.slice(0,3)}`;
        
        const { current, nextText } = getCurrentPrayer(timings);
        
        let html = `<div class="prayer-card"><div class="date-header"><span>${dateStr}</span>${nextText ? `<span class="next-prayer-countdown">${nextText}</span>` : ''}</div>`;
        
        for (const [key, name] of Object.entries(prayerNames)) {
            if (timings[key]) {
                html += `<div class="prayer-item ${current === key ? 'current' : ''}">
                            <span class="prayer-name">${name}</span>
                            <div class="prayer-time-wrapper">
                                <span class="prayer-time">${timings[key].replace(/\s*\([^)]+\)/, '')}</span>
                            </div>
                        </div>`;
            }
        }
        html += '</div>';
        document.getElementById('prayerContent').innerHTML = html;
        document.getElementById('updateTime').innerHTML = `обновлено: ${new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' })}`;
    }
    
    // Загрузка с API
    async function loadPrayerTimes() {
        document.getElementById('prayerContent').innerHTML = '<div class="loading">загружаем время намаза</div>';
        
        const url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=Россия&method=${method}&school=${school}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.code === 200) {
                const timings = {};
                for (const [key, value] of Object.entries(data.data.timings)) {
                    timings[key] = value.replace(/\s*\([^)]+\)/, '').trim();
                }
                prayerData = { timings: timings, date: data.data.date };
                localStorage.setItem('prayer_cache', JSON.stringify({ city, method, school, data: prayerData, date: new Date().toDateString() }));
                render();
            } else {
                document.getElementById('prayerContent').innerHTML = '<div class="loading">❌ город не найден</div>';
            }
        } catch(e) {
            const cache = localStorage.getItem('prayer_cache');
            if (cache) {
                const c = JSON.parse(cache);
                if (c.city === city && c.method === method && c.school === school) {
                    prayerData = c.data;
                    render();
                    document.getElementById('updateTime').innerHTML = `⚠️ офлайн · данные от ${c.date}`;
                    return;
                }
            }
            document.getElementById('prayerContent').innerHTML = '<div class="loading">❌ ошибка загрузки</div>';
        }
    }
    
    // Сохранение настроек
    function saveSettings() {
        localStorage.setItem('namaz_city', city);
        localStorage.setItem('namaz_method', method);
        localStorage.setItem('namaz_school', school);
    }
    
    function loadSettings() {
        const savedCity = localStorage.getItem('namaz_city');
        if (savedCity) { city = savedCity; document.getElementById('cityInput').value = city; }
        
        const savedMethod = localStorage.getItem('namaz_method');
        if (savedMethod) { method = parseInt(savedMethod); document.getElementById('methodValue').querySelector('span:first-child').textContent = METHODS[method] || "ДУМ РФ"; }
        
        const savedSchool = localStorage.getItem('namaz_school');
        if (savedSchool) { school = parseInt(savedSchool); document.getElementById('schoolValue').querySelector('span:first-child').textContent = school === 1 ? "Ханафитский" : "Шафиитский"; }
        
        const savedStyle = localStorage.getItem('namaz_style');
        if (savedStyle === 'neumorph') { document.body.classList.add('neumorph'); document.querySelectorAll('.style-option').forEach(opt => opt.classList.toggle('active', opt.dataset.style === 'neumorph')); }
        
        const savedTheme = localStorage.getItem('namaz_theme');
        if (savedTheme === 'dark') { document.body.classList.add('dark-theme'); document.querySelectorAll('.theme-option-btn').forEach(opt => opt.classList.toggle('active', opt.dataset.theme === 'dark')); }
        
        const cache = localStorage.getItem('prayer_cache');
        if (cache) {
            try {
                const c = JSON.parse(cache);
                if (c.city === city && c.method === method && c.school === school) {
                    prayerData = c.data;
                }
            } catch(e) {}
        }
    }
    
    // Поиск города — ИСПРАВЛЕН (сохраняет настройки)
    async function searchCity() {
        const newCity = document.getElementById('cityInput').value.trim();
        if (!newCity) return;
        city = newCity;
        saveSettings();  // ★★★ СОХРАНЯЕМ ГОРОД ★★★
        await loadPrayerTimes();
    }
    
    // Настройки меню
    function initUI() {
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsDropdown = document.getElementById('settingsDropdown');
        const methodValue = document.getElementById('methodValue');
        const methodSub = document.getElementById('methodSubDropdown');
        const schoolValue = document.getElementById('schoolValue');
        const schoolSub = document.getElementById('schoolSubDropdown');
        
        settingsBtn.onclick = (e) => { e.stopPropagation(); settingsDropdown.classList.toggle('show'); };
        methodValue.onclick = (e) => { e.stopPropagation(); methodSub.classList.toggle('show'); schoolSub.classList.remove('show'); };
        schoolValue.onclick = (e) => { e.stopPropagation(); schoolSub.classList.toggle('show'); methodSub.classList.remove('show'); };
        document.onclick = (e) => { if (!settingsBtn.contains(e.target) && !settingsDropdown.contains(e.target)) { settingsDropdown.classList.remove('show'); methodSub.classList.remove('show'); schoolSub.classList.remove('show'); } };
        
        document.querySelectorAll('#methodSubDropdown .sub-item').forEach(item => {
            item.onclick = () => { method = parseInt(item.dataset.method); saveSettings(); document.getElementById('methodValue').querySelector('span:first-child').textContent = item.textContent; methodSub.classList.remove('show'); loadPrayerTimes(); };
        });
        
        document.querySelectorAll('#schoolSubDropdown .sub-item').forEach(item => {
            item.onclick = () => { school = parseInt(item.dataset.school); saveSettings(); document.getElementById('schoolValue').querySelector('span:first-child').textContent = item.textContent; schoolSub.classList.remove('show'); loadPrayerTimes(); };
        });
        
        document.getElementById('styleToggle').onclick = (e) => {
            const opt = e.target.closest('.style-option');
            if (!opt) return;
            if (opt.dataset.style === 'neumorph') { document.body.classList.add('neumorph'); localStorage.setItem('namaz_style', 'neumorph'); }
            else { document.body.classList.remove('neumorph'); localStorage.setItem('namaz_style', 'aura'); }
            document.querySelectorAll('.style-option').forEach(o => o.classList.toggle('active', o === opt));
            if (prayerData) render();
        };
        
        document.getElementById('themeToggle').onclick = (e) => {
            const opt = e.target.closest('.theme-option-btn');
            if (!opt) return;
            if (opt.dataset.theme === 'dark') { document.body.classList.add('dark-theme'); localStorage.setItem('namaz_theme', 'dark'); }
            else { document.body.classList.remove('dark-theme'); localStorage.setItem('namaz_theme', 'light'); }
            document.querySelectorAll('.theme-option-btn').forEach(o => o.classList.toggle('active', o === opt));
            if (prayerData) render();
        };
        
        document.getElementById('searchBtn').onclick = searchCity;
        document.getElementById('cityInput').onkeypress = (e) => { if (e.key === 'Enter') searchCity(); };
    }
    
    // Запуск
    loadSettings();
    initUI();
    loadPrayerTimes();
</script>
</body>
</html>
