<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>время намаза</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #ffffff;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #888888;
            --border: #e5e5e5;
            --accent: #2d6a4f;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
            padding: 24px 16px 48px;
            min-height: 100vh;
            color: var(--text);
        }

        button, input, select {
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 500px; margin: 0 auto; }
        
        .search-bar { display: flex; gap: 10px; margin-bottom: 24px; }
        .search-input {
            flex: 1;
            padding: 14px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            font-size: 15px;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-btn {
            background: var(--accent);
            border: none;
            padding: 14px 24px;
            border-radius: 32px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .row-selects {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .row-selects select {
            flex: 1;
            padding: 12px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text);
        }
        
        .prayer-card {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .date-header {
            background: #f8f9fa;
            padding: 12px 20px;
            font-size: 13px;
            color: #666;
            border-bottom: 1px solid var(--border);
        }
        
        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .prayer-item:last-child { border-bottom: none; }
        
        .prayer-item.current {
            background: rgba(76, 175, 80, 0.08);
        }
        
        .prayer-name {
            font-size: 16.5px;
            font-weight: 500;
            color: var(--text);
        }
        
        .prayer-time {
            font-size: 18.5px;
            font-weight: 600;
            color: var(--accent);
            text-align: right;
        }
        
        .update-time { text-align: center; font-size: 12px; color: var(--text-light); margin-top: 24px; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-light); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading::after { content: '...'; animation: pulse 1.5s infinite; }
    </style>
</head>
<body>
<div class="container">
    <div class="search-bar">
        <input type="text" class="search-input" id="cityInput" placeholder="город..." value="Москва">
        <button class="search-btn" id="searchBtn">найти</button>
    </div>

    <div class="row-selects">
        <select id="methodSelect">
            <option value="13" selected>ДУМ РФ</option>
            <option value="3">MWL (Мусульманская лига)</option>
            <option value="1">UIS (Карачи)</option>
            <option value="2">ISNA (Сев. Америка)</option>
            <option value="12">Diyanet (Турция)</option>
        </select>

        <select id="schoolSelect">
            <option value="0">Шафии</option>
            <option value="1" selected>Ханафи</option>
        </select>
    </div>

    <div id="prayerContent"><div class="loading">загружаем время намаза</div></div>
    <div class="update-time" id="updateTime"></div>
</div>

<script>
    let currentCity = "Москва", currentCountry = "Россия", currentMethod = 13;
    let currentSchool = 1;
    let currentPrayerData = null;
    let lastUpdateDate = null;

    const prayerNames = { Fajr: "Фаджр", Sunrise: "Восход", Dhuhr: "Зухр", Asr: "Аср", Maghrib: "Магриб", Isha: "Иша" };
    const prayerOrder = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];

    const monthsRuShort = {
        January: "янв", February: "фев", March: "мар", April: "апр",
        May: "мая", June: "июн", July: "июл", August: "авг",
        September: "сен", October: "окт", November: "ноя", December: "дек"
    };

    const weekdaysShort = {
        Monday: "Пн", Tuesday: "Вт", Wednesday: "Ср",
        Thursday: "Чт", Friday: "Пт", Saturday: "Сб", Sunday: "Вс"
    };

    function timeToMinutes(t) { let [h,m] = t.split(':'); return parseInt(h)*60 + parseInt(m); }
    function formatTimeLeft(min) { if (min < 0) min = 0; if (min < 60) return `${min} мин`; let h = Math.floor(min/60), m = min%60; return m === 0 ? `${h} ч` : `${h} ч ${m} мин`; }

    function getCurrentPrayer(timings) {
        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        let current = null, next = null;
        for (let i = 0; i < prayerOrder.length; i++) {
            const p = prayerOrder[i];
            if (timings[p]) {
                const pm = timeToMinutes(timings[p]);
                if (pm <= currentMinutes) current = { name: prayerNames[p], time: timings[p], minutes: pm, key: p };
                else { if (!next) next = { name: prayerNames[p], time: timings[p], minutes: pm, key: p }; break; }
            }
        }
        if (current && next && currentMinutes < next.minutes) return { current, next };
        if (next) return { current: next, next: null };
        if (current) {
            const first = prayerOrder.find(p => timings[p]);
            if (first) return { current: { name: prayerNames[first], time: timings[first], key: first, minutes: timeToMinutes(timings[first]) + 1440 }, next: null };
        }
        return { current: null, next: null };
    }

    function getTimeLeft(current, next) {
        if (!current) return 0;
        const now = new Date().getHours() * 60 + new Date().getMinutes();
        const end = next ? next.minutes : (timeToMinutes(current.time) + 1440);
        return end - now;
    }

    function shouldUpdateData() {
        if (!lastUpdateDate) return true;
        return lastUpdateDate !== new Date().toDateString();
    }

    function loadSettings() {
        const savedCity = localStorage.getItem('azan_city');
        const savedMethod = localStorage.getItem('azan_method');
        const savedSchool = localStorage.getItem('azan_school');
        if (savedCity) { currentCity = savedCity; document.getElementById('cityInput').value = currentCity; }
        if (savedMethod) { currentMethod = parseInt(savedMethod); document.getElementById('methodSelect').value = currentMethod; }
        if (savedSchool) { currentSchool = parseInt(savedSchool); document.getElementById('schoolSelect').value = currentSchool; }
        const cached = localStorage.getItem('azan_cached_data');
        if (cached) { try { const c = JSON.parse(cached); if (c.city === currentCity && c.method === currentMethod && c.school === currentSchool) { currentPrayerData = c.data; lastUpdateDate = c.date; } } catch(e){} }
    }

    function saveSettings() {
        localStorage.setItem('azan_city', currentCity);
        localStorage.setItem('azan_method', currentMethod);
        localStorage.setItem('azan_school', currentSchool);
    }
    
    function saveCachedData(data) {
        const cache = { city: currentCity, method: currentMethod, school: currentSchool, data: data, date: new Date().toDateString() };
        localStorage.setItem('azan_cached_data', JSON.stringify(cache));
        currentPrayerData = data;
        lastUpdateDate = cache.date;
    }

    function renderPrayerTimes(timings, dateData) {
        const d = dateData.gregorian;
        const shortDate = `${weekdaysShort[d.weekday.en] || d.weekday.en.slice(0,2)}, ${d.day} ${monthsRuShort[d.month.en] || d.month.en.slice(0,3)}`;
        const { current, next } = getCurrentPrayer(timings);
        const timeLeft = getTimeLeft(current, next);
        
        let html = `<div class="prayer-card"><div class="date-header">${shortDate}</div>`;
        for (const [key, name] of Object.entries(prayerNames)) {
            if (timings[key]) {
                let timeDisplay = timings[key];
                if (current && current.key === key && next) timeDisplay += ` · ещё ${formatTimeLeft(timeLeft)}`;
                html += `<div class="prayer-item ${current && current.key === key ? 'current' : ''}"><span class="prayer-name">${name}</span><span class="prayer-time">${timeDisplay}</span></div>`;
            }
        }
        html += '</div>';
        document.getElementById('prayerContent').innerHTML = html;
        document.getElementById('updateTime').innerHTML = `обновлено: ${new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' })} · данные: AlAdhan API`;
    }

    async function fetchPrayerTimes(force = false) {
        if (!force && currentPrayerData && !shouldUpdateData()) { renderPrayerTimes(currentPrayerData.timings, currentPrayerData.date); return; }
        document.getElementById('prayerContent').innerHTML = '<div class="loading">загружаем время намаза</div>';
        const url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(currentCity)}&country=Россия&method=${currentMethod}&school=${currentSchool}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.code === 200) {
                const prayerData = { timings: data.data.timings, date: data.data.date };
                saveCachedData(prayerData);
                renderPrayerTimes(prayerData.timings, prayerData.date);
                saveSettings();
            } else document.getElementById('prayerContent').innerHTML = '<div class="loading">❌ город не найден</div>';
        } catch(e) {
            if (currentPrayerData) renderPrayerTimes(currentPrayerData.timings, currentPrayerData.date);
            else document.getElementById('prayerContent').innerHTML = '<div class="loading">❌ ошибка загрузки</div>';
        }
    }

    document.getElementById('searchBtn').addEventListener('click', () => { currentCity = document.getElementById('cityInput').value.trim(); fetchPrayerTimes(true); });
    document.getElementById('cityInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') { currentCity = e.target.value.trim(); fetchPrayerTimes(true); } });
    document.getElementById('methodSelect').addEventListener('change', (e) => { currentMethod = parseInt(e.target.value); fetchPrayerTimes(true); });
    document.getElementById('schoolSelect').addEventListener('change', (e) => { currentSchool = parseInt(e.target.value); fetchPrayerTimes(true); });

    loadSettings();
    fetchPrayerTimes();
</script>
</body>
</html>
