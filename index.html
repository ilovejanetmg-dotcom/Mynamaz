<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>намаз · плитка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f2efe7;
            font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 32px 20px 56px;
            color: #2a261f;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* поисковая строка — чистая, без тени */
        .search-section {
            margin-bottom: 32px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            background: white;
            border: 1px solid #e0d8cc;
            border-radius: 14px;
            font-size: 15px;
            color: #2a261f;
            font-family: inherit;
            transition: 0.15s;
        }

        .search-input:focus {
            outline: none;
            border-color: #b3a07e;
        }

        .search-btn {
            background: #b3a07e;
            border: none;
            padding: 0 26px;
            border-radius: 14px;
            color: white;
            font-weight: 510;
            font-size: 14px;
            cursor: pointer;
            transition: 0.1s;
        }

        .search-btn:active {
            background: #9b8a6b;
            transform: scale(0.97);
        }

        /* селекты — тонкие, в ряд */
        .selects-row {
            display: flex;
            gap: 12px;
        }

        .selects-row select {
            flex: 1;
            padding: 12px 14px;
            background: white;
            border: 1px solid #e0d8cc;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 470;
            color: #5c5342;
            cursor: pointer;
            font-family: inherit;
        }

        /* заголовок даты — тихий акцент */
        .date-label {
            font-size: 13px;
            font-weight: 480;
            color: #b3a07e;
            letter-spacing: 0.3px;
            margin: 24px 0 12px 6px;
        }

        /* сетка плиток */
        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 8px;
        }

        .prayer-tile {
            background: white;
            border-radius: 20px;
            padding: 20px 14px;
            text-align: center;
            transition: 0.1s;
            border: 1px solid #f0e8de;
        }

        .prayer-tile.current {
            background: #fefaf4;
            border-left: 3px solid #b3a07e;
            border-top-left-radius: 16px;
            border-bottom-left-radius: 16px;
        }

        .prayer-name-tile {
            font-size: 15px;
            font-weight: 470;
            color: #7b6e58;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }

        .prayer-time-tile {
            font-size: 22px;
            font-weight: 590;
            color: #2a261f;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .time-left {
            font-size: 12px;
            color: #b3a07e;
            margin-top: 8px;
            font-weight: 440;
        }

        /* секция следующего намаза — карточка-акцент */
        .next-card {
            background: white;
            border-radius: 24px;
            padding: 18px 22px;
            margin: 24px 0 16px;
            border: 1px solid #f0e8de;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .next-label {
            font-size: 13px;
            font-weight: 450;
            color: #b3a07e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .next-name {
            font-size: 18px;
            font-weight: 560;
            color: #2a261f;
            margin-top: 4px;
        }

        .next-time {
            font-size: 20px;
            font-weight: 590;
            color: #b3a07e;
            text-align: right;
        }

        .next-wait {
            font-size: 12px;
            color: #9b8f7a;
            margin-top: 4px;
            text-align: right;
        }

        .update-time {
            text-align: center;
            font-size: 11px;
            color: #c9beab;
            margin-top: 32px;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #cdc2ae;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e8e0d4;
        }

        .loading, .error {
            text-align: center;
            padding: 60px 24px;
            background: white;
            border-radius: 28px;
            color: #b3a07e;
        }

        @media (max-width: 480px) {
            body {
                padding: 24px 16px 48px;
            }
            .prayer-grid {
                gap: 10px;
            }
            .prayer-tile {
                padding: 16px 10px;
            }
            .prayer-time-tile {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="search-section">
        <div class="search-bar">
            <input type="text" class="search-input" id="cityInput" placeholder="Город" value="Москва">
            <button class="search-btn" id="searchBtn">найти</button>
        </div>
        <div class="selects-row">
            <select id="methodSelect"><option value="13" selected>ДУМ РФ</option><option value="3">MWL</option><option value="1">UIS</option><option value="2">ISNA</option><option value="12">Diyanet</option></select>
            <select id="schoolSelect"><option value="0">Шафии</option><option value="1" selected>Ханафи</option></select>
        </div>
    </div>

    <div id="prayerContent"><div class="loading">загрузка</div></div>
    <div class="update-time" id="updateTime"></div>
    <div class="footer">2026 · aladhan · тихий интерфейс</div>
</div>

<script>
    (function() {
        const prayerNames = { Fajr: "Фаджр", Sunrise: "Восход", Dhuhr: "Зухр", Asr: "Аср", Maghrib: "Магриб", Isha: "Иша" };
        const prayerOrder = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
        const monthsRu = { January: "янв", February: "фев", March: "мар", April: "апр", May: "мая", June: "июн", July: "июл", August: "авг", September: "сен", October: "окт", November: "ноя", December: "дек" };
        const weekdays = { Monday: "Пн", Tuesday: "Вт", Wednesday: "Ср", Thursday: "Чт", Friday: "Пт", Saturday: "Сб", Sunday: "Вс" };
        
        let city = "Москва", method = 13, school = 1, prayerData = null, lastLoadTime = null;
        
        function timeToMin(t) { let [h,m] = t.split(':'); return +h*60 + +m; }
        
        function formatTime(min) {
            if (min < 60) return `${min} мин`;
            let hours = Math.floor(min / 60);
            let mins = min % 60;
            return hours + ' ч' + (mins ? ' ' + mins + ' мин' : '');
        }
        
        function getCurrentNext(timings) {
            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();
            const prayers = prayerOrder.filter(p => timings[p]).map(p => ({
                key: p,
                name: prayerNames[p],
                time: timings[p],
                min: timeToMin(timings[p])
            }));
            if (!prayers.length) return { current: null, next: null };
            let nextPrayer = prayers.find(p => p.min > nowMin);
            if (nextPrayer) {
                let idx = prayers.indexOf(nextPrayer);
                return { current: idx > 0 ? prayers[idx-1] : null, next: nextPrayer };
            }
            return { current: prayers[prayers.length-1], next: { ...prayers[0], min: prayers[0].min + 1440 } };
        }
        
        function render() {
            if (!prayerData) return;
            const timings = prayerData.timings;
            const dateData = prayerData.date.gregorian;
            const dateStr = `${weekdays[dateData.weekday.en]}, ${dateData.day} ${monthsRu[dateData.month.en]}`;
            const { current, next } = getCurrentNext(timings);
            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();
            const leftMin = next ? next.min - nowMin : 0;
            
            let gridHtml = `<div class="date-label">${dateStr}</div><div class="prayer-grid">`;
            for (let key of prayerOrder) {
                if (timings[key]) {
                    const isCurrent = current?.key === key;
                    const timeLeft = isCurrent && next && leftMin > 0 ? formatTime(leftMin) : null;
                    gridHtml += `
                        <div class="prayer-tile ${isCurrent ? 'current' : ''}">
                            <div class="prayer-name-tile">${prayerNames[key]}</div>
                            <div class="prayer-time-tile">${timings[key]}</div>
                            ${timeLeft ? `<div class="time-left">ещё ${timeLeft}</div>` : ''}
                        </div>
                    `;
                }
            }
            gridHtml += `</div>`;
            
            let nextHtml = '';
            if (next) {
                const waitFormatted = leftMin > 0 ? formatTime(leftMin) : '';
                nextHtml = `
                    <div class="next-card">
                        <div>
                            <div class="next-label">следующий намаз</div>
                            <div class="next-name">${prayerNames[next.key]}</div>
                        </div>
                        <div>
                            <div class="next-time">${next.time}</div>
                            ${waitFormatted ? `<div class="next-wait">через ${waitFormatted}</div>` : ''}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('prayerContent').innerHTML = gridHtml + nextHtml;
            if (lastLoadTime) {
                document.getElementById('updateTime').innerHTML = `обновлено: ${lastLoadTime.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'})} · aladhan`;
            }
        }
        
        async function loadData(force = false) {
            if (!force && prayerData && lastLoadTime && new Date().toDateString() === new Date(lastLoadTime).toDateString()) {
                render();
                return;
            }
            document.getElementById('prayerContent').innerHTML = '<div class="loading">загрузка</div>';
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 8000);
                const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=Россия&method=${method}&school=${school}`, { signal: controller.signal });
                const data = await response.json();
                if (data.code === 200) {
                    prayerData = { timings: data.data.timings, date: data.data.date };
                    lastLoadTime = new Date();
                    localStorage.setItem('azan_cache', JSON.stringify({ city, method, school, prayerData, time: lastLoadTime.toISOString() }));
                    render();
                } else throw new Error();
            } catch(e) {
                if (prayerData) {
                    render();
                    document.getElementById('updateTime').innerHTML = '⚠️ офлайн режим';
                } else {
                    document.getElementById('prayerContent').innerHTML = '<div class="error">❌ не загрузилось</div>';
                }
            }
        }
        
        function saveSettings() {
            localStorage.setItem('azan_city', city);
            localStorage.setItem('azan_method', method);
            localStorage.setItem('azan_school', school);
        }
        
        const cached = localStorage.getItem('azan_cache');
        if (cached) {
            try {
                let c = JSON.parse(cached);
                let savedCity = localStorage.getItem('azan_city') || 'Москва';
                if (c.city === savedCity) {
                    prayerData = c.prayerData;
                    lastLoadTime = new Date(c.time);
                }
            } catch(e) {}
        }
        
        city = localStorage.getItem('azan_city') || 'Москва';
        method = parseInt(localStorage.getItem('azan_method') || '13');
        school = parseInt(localStorage.getItem('azan_school') || '1');
        
        document.getElementById('cityInput').value = city;
        document.getElementById('methodSelect').value = method;
        document.getElementById('schoolSelect').value = school;
        
        document.getElementById('searchBtn').onclick = () => {
            city = document.getElementById('cityInput').value.trim();
            saveSettings();
            loadData(true);
        };
        document.getElementById('cityInput').onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('searchBtn').click(); };
        document.getElementById('methodSelect').onchange = (e) => { method = +e.target.value; saveSettings(); loadData(true); };
        document.getElementById('schoolSelect').onchange = (e) => { school = +e.target.value; saveSettings(); loadData(true); };
        
        loadData();
        setInterval(() => { if (prayerData) render(); }, 60000);
    })();
</script>
</body>
</html>
