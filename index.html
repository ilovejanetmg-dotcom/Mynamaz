<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>время намаза</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #888888;
            --border: #e5e5e5;
            --accent: #2d6a4f;
            --accent-hover: #1b4d3e;
            --divider: #f0f0f0;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
            padding: 24px 16px 48px;
            min-height: 100vh;
            transition: background 0.2s;
            color: var(--text);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 20px;
            font-weight: 400;
            color: var(--text);
        }

        .location-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .location-btn:active {
            transform: scale(0.96);
            background: rgba(0,0,0,0.05);
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            font-size: 15px;
            color: var(--text);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-btn {
            background: var(--accent);
            border: none;
            padding: 14px 24px;
            border-radius: 32px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
        }

        .search-btn:active {
            transform: scale(0.96);
            opacity: 0.85;
        }

        .method-select {
            margin-bottom: 24px;
        }

        .method-select select {
            width: 100%;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            font-size: 14px;
            color: var(--text);
            outline: none;
        }

        .method-select select:focus {
            border-color: var(--accent);
        }

        .prayer-card {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .prayer-item:last-child {
            border-bottom: none;
        }

        .prayer-name {
            font-size: 17px;
            font-weight: 500;
            color: var(--text);
        }

        .prayer-time {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
        }

        .update-time {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 24px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading::after {
            content: '...';
            animation: pulse 1.5s infinite;
        }

        .geo-error {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">время намаза</div>
        <button class="location-btn" id="locationBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 2a10 10 0 0 0 0 20 10 10 0 0 0 0-20Z"/>
                <line x1="2" y1="12" x2="4" y2="12"/>
                <line x1="20" y1="12" x2="22" y2="12"/>
                <line x1="12" y1="2" x2="12" y2="4"/>
                <line x1="12" y1="20" x2="12" y2="22"/>
            </svg>
            моя геолокация
        </button>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" id="cityInput" placeholder="город..." value="Москва">
        <button class="search-btn" id="searchBtn">найти</button>
    </div>

    <div class="method-select">
        <select id="methodSelect">
            <option value="1" selected>University of Islamic Sciences, Karachi</option>
            <option value="13">Spiritual Administration of Muslims of Russia</option>
            <option value="2">Islamic Society of North America (ISNA)</option>
            <option value="3">Muslim World League (MWL)</option>
            <option value="12">Diyanet İşleri Başkanlığı, Turkey</option>
            <option value="4">Umm Al-Qura (Мекка)</option>
        </select>
    </div>

    <div id="prayerContent">
        <div class="loading">загружаем время намаза</div>
    </div>

    <div class="update-time" id="updateTime"></div>
</div>

<script>
    let currentCity = "Москва";
    let currentCountry = "Россия";
    let currentMethod = 1;
    let currentLat = null;
    let currentLon = null;

    const prayerNames = {
        Fajr: "Фаджр",
        Sunrise: "Восход",
        Dhuhr: "Зухр",
        Asr: "Аср",
        Maghrib: "Магриб",
        Isha: "Иша"
    };

    // Получение города по координатам (обратный геокодинг)
    async function getCityFromCoords(lat, lon) {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
            const response = await fetch(url);
            const data = await response.json();
            
            // Определяем город через Open-Meteo Geocoding
            const geocodeUrl = `https://geocoding-api.open-meteo.com/v1/search?latitude=${lat}&longitude=${lon}&count=1&language=ru&format=json`;
            const geoRes = await fetch(geocodeUrl);
            const geoData = await geoRes.json();
            
            if (geoData.results && geoData.results.length > 0) {
                return geoData.results[0].name;
            }
            return null;
        } catch (error) {
            console.error('Геокодинг ошибка:', error);
            return null;
        }
    }

    // Получение страны по координатам (упрощённо)
    function getCountryFromCoords(lat, lon) {
        if (lat >= 40 && lat <= 80 && lon >= 20 && lon <= 180) return "Россия";
        return "Россия";
    }

    // Геолокация
    function getGeolocation() {
        const contentDiv = document.getElementById('prayerContent');
        contentDiv.innerHTML = '<div class="loading">определяем ваше местоположение...</div>';
        
        if (!navigator.geolocation) {
            contentDiv.innerHTML = '<div class="geo-error">❌ Ваш браузер не поддерживает геолокацию</div>';
            return;
        }
        
        navigator.geolocation.getCurrentPosition(
            async (position) => {
                currentLat = position.coords.latitude;
                currentLon = position.coords.longitude;
                
                const city = await getCityFromCoords(currentLat, currentLon);
                if (city) {
                    currentCity = city;
                    document.getElementById('cityInput').value = currentCity;
                    await fetchPrayerTimes();
                } else {
                    // Если не удалось определить город, пробуем по координатам через другой сервис
                    try {
                        const reverseUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLon}&accept-language=ru`;
                        const response = await fetch(reverseUrl);
                        const data = await response.json();
                        if (data.address && data.address.city) {
                            currentCity = data.address.city;
                        } else if (data.address && data.address.town) {
                            currentCity = data.address.town;
                        } else {
                            currentCity = `${currentLat.toFixed(2)}, ${currentLon.toFixed(2)}`;
                        }
                        document.getElementById('cityInput').value = currentCity;
                        await fetchPrayerTimes();
                    } catch (e) {
                        currentCity = `${currentLat.toFixed(2)}, ${currentLon.toFixed(2)}`;
                        document.getElementById('cityInput').value = currentCity;
                        await fetchPrayerTimes();
                    }
                }
            },
            (error) => {
                let errorMessage = "❌ Не удалось определить местоположение";
                if (error.code === 1) {
                    errorMessage = "❌ Доступ к геолокации запрещён. Разрешите доступ в настройках браузера";
                } else if (error.code === 2) {
                    errorMessage = "❌ Не удалось определить местоположение. Попробуйте ввести город вручную";
                }
                document.getElementById('prayerContent').innerHTML = `<div class="geo-error">${errorMessage}</div>`;
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
    }

    async function fetchPrayerTimes() {
        const contentDiv = document.getElementById('prayerContent');
        contentDiv.innerHTML = '<div class="loading">загружаем время намаза</div>';

        const url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(currentCity)}&country=${encodeURIComponent(currentCountry)}&method=${currentMethod}`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.code === 200) {
                renderPrayerTimes(data.data);
            } else {
                contentDiv.innerHTML = '<div class="loading">❌ город не найден</div>';
            }
        } catch (error) {
            contentDiv.innerHTML = '<div class="loading">❌ ошибка загрузки</div>';
        }
    }

    function renderPrayerTimes(data) {
        const timings = data.timings;

        let prayersHtml = '<div class="prayer-card">';
        
        for (const [key, name] of Object.entries(prayerNames)) {
            if (timings[key]) {
                prayersHtml += `
                    <div class="prayer-item">
                        <span class="prayer-name">${name}</span>
                        <span class="prayer-time">${timings[key]}</span>
                    </div>
                `;
            }
        }
        prayersHtml += '</div>';

        document.getElementById('prayerContent').innerHTML = prayersHtml;
        document.getElementById('updateTime').innerHTML = `обновлено: ${new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })} · данные: AlAdhan API`;
    }

    async function searchCity() {
        const city = document.getElementById('cityInput').value.trim();
        if (city) {
            currentCity = city;
            currentMethod = parseInt(document.getElementById('methodSelect').value);
            await fetchPrayerTimes();
        }
    }

    document.getElementById('searchBtn').addEventListener('click', searchCity);
    document.getElementById('cityInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchCity();
    });
    document.getElementById('methodSelect').addEventListener('change', () => {
        currentMethod = parseInt(document.getElementById('methodSelect').value);
        fetchPrayerTimes();
    });
    document.getElementById('locationBtn').addEventListener('click', getGeolocation);

    fetchPrayerTimes();
</script>
</body>
</html>
