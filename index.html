<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>время намаза</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        :root{--bg:#fff;--card:#fff;--text:#1a1a1a;--border:#e5e5e5;--accent:#2d6a4f;}
        @media(prefers-color-scheme:dark){
            :root{--bg:#0a0a0a;--card:#141414;--text:#e0e0e0;--border:#2a2a2a;}
        }
        body{background:var(--bg);font-family:-apple-system,system-ui,sans-serif;padding:24px 16px 48px;color:var(--text);}
        .container{max-width:500px;margin:0 auto;}
        .search-bar{display:flex;gap:10px;margin-bottom:24px;}
        .search-input{flex:1;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:32px;font-size:15px;color:var(--text);}
        .search-input:focus{outline:none;border-color:rgba(0,0,0,0.15);box-shadow:0 0 0 3px rgba(0,0,0,0.05);}
        @media(prefers-color-scheme:dark){.search-input:focus{border-color:rgba(255,255,255,0.15);box-shadow:0 0 0 3px rgba(255,255,255,0.03);}}
        .search-btn{background:var(--accent);border:none;padding:14px 24px;border-radius:32px;color:white;font-weight:600;cursor:pointer;}
        .search-btn:focus,.search-btn:hover{opacity:0.9;}
        .row-selects{display:flex;gap:12px;margin-bottom:24px;}
        .row-selects select{flex:1;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:28px;font-size:12px;cursor:pointer;color:var(--text);}
        select:focus,.search-btn:focus{outline:none;box-shadow:none;}
        .prayer-card{background:var(--card);border-radius:24px;border:1px solid var(--border);overflow:hidden;}
        .date-header{background:#f8f9fa;padding:12px 20px;font-size:13px;color:#666;border-bottom:1px solid var(--border);}
        @media(prefers-color-scheme:dark){.date-header{background:#1a1a1a;color:#888;border-bottom-color:#2a2a2a;}}
        .prayer-item{display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
        .prayer-item:last-child{border-bottom:none;}
        .prayer-item.current{background:rgba(45,106,79,0.06);border-left:2px solid var(--accent);padding-left:18px;}
        .prayer-name{font-size:16px;font-weight:450;}
        .prayer-time{font-size:17.5px;font-weight:550;color:var(--accent);text-align:right;}
        .update-time{text-align:center;font-size:12px;color:#888;margin-top:24px;}
        .footer{text-align:center;font-size:10px;color:#aaa;margin-top:32px;letter-spacing:0.3px;}
        @media(prefers-color-scheme:dark){.footer{color:#444;}}
        .loading{text-align:center;padding:60px 20px;color:#888;}
        @keyframes pulse{50%{opacity:0.5;}}
        .loading::after{content:'...';animation:pulse 1.5s infinite;}
        .error{text-align:center;padding:40px 20px;color:#d32f2f;background:var(--card);border-radius:24px;}
    </style>
</head>
<body>
<div class="container">
    <div class="search-bar">
        <input type="text" class="search-input" id="cityInput" placeholder="Москва" value="Москва">
        <button class="search-btn" id="searchBtn">найти</button>
    </div>
    <div class="row-selects">
        <select id="methodSelect"><option value="13" selected>ДУМ РФ</option><option value="3">MWL</option><option value="1">UIS</option><option value="2">ISNA</option><option value="12">Diyanet</option></select>
        <select id="schoolSelect"><option value="0">Шафии</option><option value="1" selected>Ханафи</option></select>
    </div>
    <div id="prayerContent"><div class="loading">загружаем</div></div>
    <div class="update-time" id="updateTime"></div>
    <div class="footer">2026 · 15 april</div>
</div>
<script>
    const pN={Fajr:"Фаджр",Sunrise:"Восход",Dhuhr:"Зухр",Asr:"Аср",Maghrib:"Магриб",Isha:"Иша"},pO=["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
    const mR={January:"янв",February:"фев",March:"мар",April:"апр",May:"мая",June:"июн",July:"июл",August:"авг",September:"сен",October:"окт",November:"ноя",December:"дек"};
    const wD={Monday:"Пн",Tuesday:"Вт",Wednesday:"Ср",Thursday:"Чт",Friday:"Пт",Saturday:"Сб",Sunday:"Вс"};
    let city="Москва",method=13,school=1,pData=null,lastLoad=null,intv=null;
    function tMin(t){let[h,m]=t.split(':');return +h*60+ +m;}
    function fmt(m){return m<60?`${m} мин`:`${Math.floor(m/60)} ч ${m%60?m%60+' мин':''}`.trim();}
    function curNext(ts){
        const now=new Date(),nowM=now.getHours()*60+now.getMinutes();
        const p=pO.filter(k=>ts[k]).map(k=>({key:k,name:pN[k],time:ts[k],min:tMin(ts[k])}));
        if(!p.length)return{current:null,next:null};
        let nx=p.find(x=>x.min>nowM);
        if(nx){let i=p.indexOf(nx);return{current:i>0?p[i-1]:null,next:nx};}
        return{current:p[p.length-1],next:{...p[0],min:p[0].min+1440}};
    }
    function render(){
        if(!pData)return;
        const t=pData.timings,d=pData.date.gregorian,dateStr=`${wD[d.weekday.en]}, ${d.day} ${mR[d.month.en]}`;
        const {current,next}=curNext(t),left=next?next.min-(new Date().getHours()*60+new Date().getMinutes()):0;
        let h=`<div class="prayer-card"><div class="date-header">${dateStr}</div>`;
        for(let k of pO)if(t[k]){
            let dsp=t[k];
            if(current?.key===k&&next&&left>0)dsp+=` · ещё ${fmt(left)}`;
            h+=`<div class="prayer-item ${current?.key===k?'current':''}"><span class="prayer-name">${pN[k]}</span><span class="prayer-time">${dsp}</span></div>`;
        }
        h+='</div>';
        document.getElementById('prayerContent').innerHTML=h;
        if(lastLoad)document.getElementById('updateTime').innerHTML=`обновлено: ${lastLoad.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})} · AlAdhan`;
    }
    async function load(f=0){
        if(!f&&pData&&lastLoad&&new Date().toDateString()===new Date(lastLoad).toDateString()){render();return;}
        document.getElementById('prayerContent').innerHTML='<div class="loading">загружаем</div>';
        try{
            const c=new AbortController();setTimeout(()=>c.abort(),8e3);
            const r=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=Россия&method=${method}&school=${school}`,{signal:c.signal});
            const d=await r.json();
            if(d.code===200){pData={timings:d.data.timings,date:d.data.date};lastLoad=new Date();localStorage.setItem('azan_cache',JSON.stringify({city,method,school,pData,time:lastLoad.toISOString()}));render();}
            else throw new Error();
        }catch(e){if(pData){render();document.getElementById('updateTime').innerHTML='⚠️ офлайн';}else document.getElementById('prayerContent').innerHTML='<div class="error">❌ ошибка</div>';}
    }
    function save(){localStorage.setItem('azan_city',city);localStorage.setItem('azan_method',method);localStorage.setItem('azan_school',school);}
    let cch=localStorage.getItem('azan_cache');
    if(cch)try{let c=JSON.parse(cch);if(c.city===(localStorage.getItem('azan_city')||'Москва')){pData=c.pData;lastLoad=new Date(c.time);}}catch(e){}
    city=localStorage.getItem('azan_city')||'Москва';
    method=parseInt(localStorage.getItem('azan_method')||'13');
    school=parseInt(localStorage.getItem('azan_school')||'1');
    document.getElementById('cityInput').value=city;
    document.getElementById('methodSelect').value=method;
    document.getElementById('schoolSelect').value=school;
    document.getElementById('searchBtn').onclick=()=>{city=document.getElementById('cityInput').value.trim();save();load(1);};
    document.getElementById('cityInput').onkeypress=e=>{if(e.key==='Enter')document.getElementById('searchBtn').click();};
    document.getElementById('methodSelect').onchange=e=>{method=+e.target.value;save();load(1);};
    document.getElementById('schoolSelect').onchange=e=>{school=+e.target.value;save();load(1);};
    load();
    if(intv)clearInterval(intv);
    intv=setInterval(render,6e4);
</script>
</body>
</html>
