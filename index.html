<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>время намаза</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        
        body{background:#ffffff;font-family:-apple-system,system-ui,sans-serif;padding:24px 16px 48px;color:#1a1a1a;}
        .container{max-width:500px;margin:0 auto;}
        .search-bar{display:flex;gap:10px;margin-bottom:24px;}
        .search-input{flex:1;padding:14px 18px;background:#ffffff;border:1px solid #e5e5e5;border-radius:32px;font-size:15px;color:#1a1a1a;}
        .search-input:focus{outline:none;border-color:rgba(0,0,0,0.15);box-shadow:0 0 0 3px rgba(0,0,0,0.05);}
        .search-btn{background:#2d6a4f;border:none;padding:14px 24px;border-radius:32px;color:white;font-weight:600;cursor:pointer;}
        .search-btn:focus,.search-btn:hover{opacity:0.9;}
        .row-selects{display:flex;gap:12px;margin-bottom:24px;}
        .row-selects select{flex:1;padding:10px 12px;background:#ffffff;border:1px solid #e5e5e5;border-radius:28px;font-size:12px;cursor:pointer;color:#1a1a1a;}
        select:focus,.search-btn:focus{outline:none;box-shadow:none;}
        .prayer-card{background:#ffffff;border-radius:24px;border:1px solid #e5e5e5;overflow:hidden;}
        .date-header{background:#f8f9fa;padding:12px 20px;font-size:13px;color:#666;border-bottom:1px solid #e5e5e5;}
        .prayer-item{display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e5e5e5;}
        .prayer-item:last-child{border-bottom:none;}
        .prayer-item.current{background:rgba(45,106,79,0.04);border-left:2px solid #2d6a4f;padding-left:18px;}
        .prayer-name{font-size:16px;font-weight:450;color:#1a1a1a;}
        .prayer-time{font-size:17.5px;font-weight:550;color:#2d6a4f;text-align:right;}
        .update-time{text-align:center;font-size:12px;color:#888;margin-top:24px;}
        .footer{text-align:center;font-size:10px;color:#aaa;margin-top:32px;letter-spacing:0.3px;}
        .loading{text-align:center;padding:60px 20px;color:#888;}
        @keyframes pulse{50%{opacity:0.5;}}
        .loading::after{content:'...';animation:pulse 1.5s infinite;}
        .error{text-align:center;padding:40px 20px;color:#d32f2f;background:#ffffff;border-radius:24px;}
    </style>
</head>
<body>
<div class="container">
    <div class="search-bar">
        <input type="text" class="search-input" id="cityInput" placeholder="Москва" value="Москва">
        <button class="search-btn" id="searchBtn">найти</button>
    </div>
    <div class="row-selects">
        <select id="methodSelect"><option value="13" selected>ДУМ РФ</option><option value="3">MWL</option><option value="1">UIS</option><option value="2">ISNA</option><option value="12">Diyanet</option></select>
        <select id="schoolSelect"><option value="0">Шафии</option><option value="1" selected>Ханафи</option></select>
    </div>
    <div id="prayerContent"><div class="loading">загружаем</div></div>
    <div class="update-time" id="updateTime"></div>
    <div class="footer">2026 · 15 april</div>
</div>
<script>
    const prayerNames={Fajr:"Фаджр",Sunrise:"Восход",Dhuhr:"Зухр",Asr:"Аср",Maghrib:"Магриб",Isha:"Иша"};
    const prayerOrder=["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
    const monthsRu={January:"янв",February:"фев",March:"мар",April:"апр",May:"мая",June:"июн",July:"июл",August:"авг",September:"сен",October:"окт",November:"ноя",December:"дек"};
    const weekdays={Monday:"Пн",Tuesday:"Вт",Wednesday:"Ср",Thursday:"Чт",Friday:"Пт",Saturday:"Сб",Sunday:"Вс"};
    
    let city="Москва",method=13,school=1,prayerData=null,lastLoadTime=null;
    
    function timeToMin(t){let[h,m]=t.split(':');return +h*60+ +m;}
    function formatTime(min){return min<60?`${min} мин`:`${Math.floor(min/60)} ч ${min%60?min%60+' мин':''}`.trim();}
    
    function getCurrentNext(timings){
        const now=new Date(),nowMin=now.getHours()*60+now.getMinutes();
        const prayers=prayerOrder.filter(p=>timings[p]).map(p=>({key:p,name:prayerNames[p],time:timings[p],min:timeToMin(timings[p])}));
        if(!prayers.length)return{current:null,next:null};
        let nextPrayer=prayers.find(p=>p.min>nowMin);
        if(nextPrayer){
            let idx=prayers.indexOf(nextPrayer);
            return{current:idx>0?prayers[idx-1]:null,next:nextPrayer};
        }
        return{current:prayers[prayers.length-1],next:{...prayers[0],min:prayers[0].min+1440}};
    }
    
    function render(){
        if(!prayerData)return;
        const timings=prayerData.timings,dateData=prayerData.date.gregorian;
        const dateStr=`${weekdays[dateData.weekday.en]}, ${dateData.day} ${monthsRu[dateData.month.en]}`;
        const {current,next}=getCurrentNext(timings);
        const leftMin=next?next.min-(new Date().getHours()*60+new Date().getMinutes()):0;
        
        let html=`<div class="prayer-card"><div class="date-header">${dateStr}</div>`;
        for(let key of prayerOrder){
            if(timings[key]){
                let display=timings[key];
                if(current?.key===key&&next&&leftMin>0)display+=` · ещё ${formatTime(leftMin)}`;
                html+=`<div class="prayer-item ${current?.key===key?'current':''}"><span class="prayer-name">${prayerNames[key]}</span><span class="prayer-time">${display}</span></div>`;
            }
        }
        html+='</div>';
        document.getElementById('prayerContent').innerHTML=html;
        if(lastLoadTime)document.getElementById('updateTime').innerHTML=`обновлено: ${lastLoadTime.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})} · AlAdhan`;
    }
    
    async function loadData(force=false){
        if(!force&&prayerData&&lastLoadTime&&new Date().toDateString()===new Date(lastLoadTime).toDateString()){
            render();
            return;
        }
        document.getElementById('prayerContent').innerHTML='<div class="loading">загружаем</div>';
        try{
            const controller=new AbortController();
            setTimeout(()=>controller.abort(),8000);
            const response=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=Россия&method=${method}&school=${school}`,{signal:controller.signal});
            const data=await response.json();
            if(data.code===200){
                prayerData={timings:data.data.timings,date:data.data.date};
                lastLoadTime=new Date();
                localStorage.setItem('azan_cache',JSON.stringify({city,method,school,prayerData,time:lastLoadTime.toISOString()}));
                render();
            }else throw new Error();
        }catch(e){
            if(prayerData){render();document.getElementById('updateTime').innerHTML='⚠️ офлайн режим';}
            else document.getElementById('prayerContent').innerHTML='<div class="error">❌ не загрузилось</div>';
        }
    }
    
    function saveSettings(){
        localStorage.setItem('azan_city',city);
        localStorage.setItem('azan_method',method);
        localStorage.setItem('azan_school',school);
    }
    
    const cached=localStorage.getItem('azan_cache');
    if(cached){
        try{
            let c=JSON.parse(cached);
            if(c.city===(localStorage.getItem('azan_city')||'Москва')){
                prayerData=c.prayerData;
                lastLoadTime=new Date(c.time);
            }
        }catch(e){}
    }
    
    city=localStorage.getItem('azan_city')||'Москва';
    method=parseInt(localStorage.getItem('azan_method')||'13');
    school=parseInt(localStorage.getItem('azan_school')||'1');
    document.getElementById('cityInput').value=city;
    document.getElementById('methodSelect').value=method;
    document.getElementById('schoolSelect').value=school;
    
    document.getElementById('searchBtn').onclick=()=>{city=document.getElementById('cityInput').value.trim();saveSettings();loadData(true);};
    document.getElementById('cityInput').onkeypress=e=>{if(e.key==='Enter')document.getElementById('searchBtn').click();};
    document.getElementById('methodSelect').onchange=e=>{method=+e.target.value;saveSettings();loadData(true);};
    document.getElementById('schoolSelect').onchange=e=>{school=+e.target.value;saveSettings();loadData(true);};
    
    loadData();
</script>
</body>
</html>
